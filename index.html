<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart DTC | Vansh Jhingan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="alert-modal" class="modal-overlay">
      <div class="modal-content">
          <i id="modal-icon" class="bi bi-info-circle"></i>
          <h2 id="modal-title">Alert</h2>
          <p id="modal-message"></p>
          <button id="modal-close-btn" class="submit-btn">Okay</button>
      </div>
  </div>

  <div id="login-page" class="page">
    <div class="login-container">
      <div class="logo"><i class="bi bi-bus-front"></i><h1>Smart DTC</h1></div>
      <div class="login-form">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="10-Digit Mobile" pattern="[6-9]{1}[0-9]{9}" required>
        <div class="login-option">
          <button class="login-trigger" data-target="driver-dashboard">Driver</button>
          <button class="login-trigger" data-target="passenger-dashboard">Passenger</button>
          <button class="login-trigger" data-target="admin-dashboard">Admin</button>
        </div>
      </div>
    </div>
  </div>

  <div id="passenger-dashboard" class="page">
    <header>
      <h1><i class="bi bi-house-door"></i> Passenger Hub</h1>
      <div class="actions">
        <button id="darkToggle" class="icon-btn"><i class="bi bi-moon-stars-fill"></i></button>
        <button class="logout-btn"><i class="bi bi-box-arrow-right"></i> Logout</button>
      </div>
    </header>
    <div class="banner-wrapper"><img src="delhigif.gif" alt="Delhi"></div>
    <main class="dashboard-grid">
      <div class="card nav-card" data-page="ticket-page"><i class="bi bi-ticket-perforated"></i><h2>Tickets</h2></div>
      <div class="card nav-card" data-page="tracking-page"><i class="bi bi-broadcast-pin"></i><h2>Tracking</h2></div>
      <div class="card nav-card" data-page="crowd-page"><i class="bi bi-people"></i><h2>Crowd</h2></div>
      <div class="card nav-card" data-page="planner-page"><i class="bi bi-sign-turn-right"></i><h2>Planner</h2></div>
    </main>
  </div>

  <div id="ticket-page" class="page">
    <header><h1>Buy Ticket</h1><button class="back-btn" data-target="passenger-dashboard">Back</button></header>
    <main class="form-view">
      <div class="content-box">
        <div class="type-sel">
          <input type="radio" name="btype" id="ac" value="ac" checked><label for="ac">AC</label>
          <input type="radio" name="btype" id="nac" value="nonAc"><label for="nac">Non-AC</label>
        </div>
        <select id="route-sel"><option value="">-- Route --</option></select>
        <select id="start-sel" disabled><option>-- Start --</option></select>
        <select id="end-sel" disabled><option>-- End --</option></select>
        <input type="number" id="t-count" value="1" min="1">
        <div id="fare-res">Fare: ₹0</div>
        <button id="buy-btn" class="submit-btn">Proceed</button>
      </div>
    </main>
  </div>

  <div id="planner-page" class="page">
    <header><h1>Planner</h1><button class="back-btn" data-target="passenger-dashboard">Back</button></header>
    <main class="form-view">
      <div class="content-box">
        <select id="p-start"></select>
        <select id="p-end"></select>
        <button id="search-btn" class="submit-btn">Find Bus</button>
        <div id="p-results"></div>
      </div>
    </main>
  </div>

  <div id="crowd-page" class="page">
    <header><h1>Crowd</h1><button class="back-btn" data-target="passenger-dashboard">Back</button></header>
    <main class="form-view"><div class="content-box"><h3>Live Count</h3><div id="pax-val" class="stat">12</div></div></main>
  </div>

  <div id="tracking-page" class="page">
    <header><h1>Live GPS</h1><button class="back-btn" data-target="passenger-dashboard">Back</button></header>
    <main class="form-view"><div class="content-box"><i class="bi bi-geo-alt"></i><p>Fetching GPS...</p></div></main>
  </div>

  <footer class="app-footer">
    <p>Developed by **Vansh Jhingan** | BCA BVIMR</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
