<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart DTC System | Vansh Jhingan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="alert-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
          <i id="modal-icon" class="bi bi-info-circle"></i>
          <h2 id="modal-title">System Alert</h2>
          <p id="modal-message"></p>
          <button id="modal-close-btn" class="submit-btn">Close</button>
      </div>
  </div>

  <div id="login-page" class="page">
    <div class="login-container">
      <div class="logo"><i class="bi bi-bus-front"></i><h1>Smart DTC System</h1></div>
      <div class="login-form">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="10-Digit Mobile" pattern="[6-9]{1}[0-9]{9}" required>
        <div class="login-option">
          <button class="login-trigger" data-target="driver-dashboard">Driver Console</button>
          <button class="login-trigger" data-target="passenger-dashboard">Passenger Hub</button>
          <button class="login-trigger" data-target="admin-dashboard">Admin Panel</button>
        </div>
      </div>
    </div>
  </div>

  <div id="passenger-dashboard" class="page">
    <header>
      <h1><i class="bi bi-house-door"></i> Passenger Hub</h1>
      <div class="actions">
        <button id="darkToggle" class="icon-btn"><i class="bi bi-moon-stars-fill"></i></button>
        <button class="logout-btn">Logout</button>
      </div>
    </header>
    <div class="banner-wrapper"><img src="delhigif.gif" alt="Delhi"></div>
    <main class="dashboard-grid">
      <div class="card nav-card" data-page="ticket-page"><i class="bi bi-ticket-perforated"></i><h2>Tickets</h2></div>
      <div class="card nav-card" data-page="tracking-page"><i class="bi bi-broadcast-pin"></i><h2>Tracking</h2></div>
      <div class="card nav-card" data-page="crowd-page"><i class="bi bi-people"></i><h2>Crowd</h2></div>
      <div class="card nav-card" data-page="planner-page"><i class="bi bi-sign-turn-right"></i><h2>Planner</h2></div>
    </main>
  </div>

  <div id="driver-dashboard" class="page">
    <header><h1>Driver Console</h1><button class="logout-btn">Logout</button></header>
    <main class="dashboard-grid">
      <div class="card btn-action" data-type="shift-start"><i class="bi bi-play-circle"></i><h2>Start Shift</h2></div>
      <div class="card btn-action" data-type="emergency"><i class="bi bi-exclamation-octagon"></i><h2>Emergency Help</h2></div>
      <div class="card"><i class="bi bi-people"></i><h2 id="dr-pax">12</h2><div class="btn-row"><button id="p-min">-</button><button id="p-plus">+</button></div></div>
      <div class="card btn-action" data-type="shift-end"><i class="bi bi-stop-circle"></i><h2>End Shift</h2></div>
    </main>
  </div>

  <div id="admin-dashboard" class="page">
    <header><h1>Admin Panel</h1><button class="logout-btn">Logout</button></header>
    <main class="dashboard-grid">
      <div class="card btn-action" data-type="stats"><i class="bi bi-graph-up"></i><h2>Usage Stats</h2></div>
      <div class="card btn-action" data-type="crew"><i class="bi bi-person-badge"></i><h2>Crew List</h2></div>
    </main>
  </div>

  <div id="ticket-page" class="page">
    <header><h1>Buy Ticket</h1><button class="back-btn" data-target="passenger-dashboard">Back</button></header>
    <main class="form-view">
      <div class="content-box">
        <select id="r-sel"><option value="">-- Select Route --</option></select>
        <select id="s-sel" disabled></select><select id="e-sel" disabled></select>
        <div id="fare-txt">Fare: ₹0</div>
        <button id="book-btn" class="submit-btn">Confirm Ticket</button>
      </div>
    </main>
  </div>

  <footer class="app-footer">
    <p>Developed by **Vansh Jhingan**</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
